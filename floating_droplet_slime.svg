<svg width="100%" viewBox="0 0 680 420" role="img" style="" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A cheerful floating droplet slime character with a glossy translucent body and expressive blinking eyes</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">An animated blue-green teardrop-shaped slime character with gradient shading, a glossy translucent highlight, and simple dark eyes that close into happy curved lines when it blinks, jiggling and looping gently in the air with a matching shadow.</desc>
<defs>
<linearGradient id="dropBody" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#7FE0BE"/>
  <stop offset="55%" stop-color="#3FBE92"/>
  <stop offset="100%" stop-color="#0F6E56"/>
</linearGradient>
<radialGradient id="shine" cx="35%" cy="30%" r="70%">
  <stop offset="0%" stop-color="#EFFFF9" stop-opacity="0.85"/>
  <stop offset="100%" stop-color="#EFFFF9" stop-opacity="0"/>
</radialGradient>
</defs>

