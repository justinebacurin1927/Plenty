<svg viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
<title>A cheerful floating water droplet character styled for dark mode, with a soft glow and a crescent moon</title>
<defs>
<linearGradient id="dropBodyDark" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#6FB3EE"/>
  <stop offset="55%" stop-color="#2E7FD1"/>
  <stop offset="100%" stop-color="#123B70"/>
</linearGradient>
<radialGradient id="shineDark" cx="35%" cy="30%" r="70%">
  <stop offset="0%" stop-color="#EAF6FF" stop-opacity="0.85"/>
  <stop offset="100%" stop-color="#EAF6FF" stop-opacity="0"/>
</radialGradient>
<radialGradient id="glow" cx="50%" cy="55%" r="60%">
  <stop offset="0%" stop-color="#5CC9FF" stop-opacity="0.55"/>
  <stop offset="60%" stop-color="#5CC9FF" stop-opacity="0.15"/>
  <stop offset="100%" stop-color="#5CC9FF" stop-opacity="0"/>
</radialGradient>
<filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
  <feGaussianBlur stdDeviation="8" result="blur"/>
  <feMerge>
    <feMergeNode in="blur"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>
</defs>
<style>
rect.bg { fill: #0B1626; }
.loop { animation: loop 4s ease-in-out infinite; transform-origin: 340px 260px; }
@keyframes loop {
  0%   { transform: translate(0px, 0px) rotate(0deg); }
  25%  { transform: translate(35px, -20px) rotate(4deg); }
  50%  { transform: translate(0px, -35px) rotate(0deg); }
  75%  { transform: translate(-35px, -20px) rotate(-4deg); }
  100% { transform: translate(0px, 0px) rotate(0deg); }
}
.shadow { animation: shadowLoop 4s ease-in-out infinite; transform-origin: 340px 400px; }
@keyframes shadowLoop {
  0%   { transform: translateX(0px) scale(1); opacity: 0.35; }
  25%  { transform: translateX(35px) scale(0.85); opacity: 0.22; }
  50%  { transform: translateX(0px) scale(0.7); opacity: 0.14; }
  75%  { transform: translateX(-35px) scale(0.85); opacity: 0.22; }
  100% { transform: translateX(0px) scale(1); opacity: 0.35; }
}
.glowPulse { animation: glowPulse 3s ease-in-out infinite; transform-origin: 340px 260px; }
@keyframes glowPulse {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.06); }
}
.eyeOpen { animation: eyeOpen 4.5s steps(1) infinite; }
@keyframes eyeOpen {
  0%, 90% { opacity: 1; }
  91%, 97% { opacity: 0; }
  98%, 100% { opacity: 1; }
}
.eyeClosed { animation: eyeClosed 4.5s steps(1) infinite; opacity: 0; }
@keyframes eyeClosed {
  0%, 90% { opacity: 0; }
  91%, 97% { opacity: 1; }
  98%, 100% { opacity: 0; }
}
.jiggle { animation: jiggle 4s ease-in-out infinite; transform-origin: 340px 380px; }
@keyframes jiggle {
  0%, 50%, 100% { transform: scale(1, 1); }
  46% { transform: scale(1.08, 0.9); }
  54% { transform: scale(0.95, 1.06); }
  58% { transform: scale(1.02, 0.98); }
}
.moon { animation: moonFloat 4s ease-in-out infinite; transform-origin: 520px 100px; }
@keyframes moonFloat {
  0%, 100% { transform: translateY(0px); opacity: 0.85; }
  50% { transform: translateY(-8px); opacity: 1; }
}
.star { animation: twinkle 3s ease-in-out infinite; }
.star1 { transform-origin: 480px 200px; animation-delay: 0s; }
.star2 { transform-origin: 210px 190px; animation-delay: 0.8s; }
.star3 { transform-origin: 460px 320px; animation-delay: 1.6s; }
@keyframes twinkle {
  0%, 60%, 100% { opacity: 0.15; transform: scale(0.7); }
  30% { opacity: 1; transform: scale(1.1); }
}
</style>
<rect class="bg" x="0" y="0" width="680" height="420"/>
<ellipse class="shadow" cx="340" cy="400" rx="70" ry="12" fill="#000000"/>
<circle class="star star1" cx="480" cy="200" r="2.5" fill="#EAF6FF"/>
<circle class="star star2" cx="210" cy="190" r="2" fill="#EAF6FF"/>
<circle class="star star3" cx="460" cy="320" r="2.2" fill="#EAF6FF"/>
<g class="loop">
  <path class="moon" d="M520,80 a28,28 0 1 0 0,56 a21,21 0 1 1 0,-56 Z" fill="#F4F1E4"/>
  <circle class="glowPulse" cx="340" cy="260" r="140" fill="url(#glow)"/>
  <g class="jiggle" filter="url(#softGlow)">
    <path d="M340,90 C340,90 250,225 250,300 C250,353 290,392 340,392 C390,392 430,353 430,300 C430,225 340,90 340,90 Z" fill="url(#dropBodyDark)" stroke="#5CC9FF" stroke-width="2"/>
    <path d="M340,90 C340,90 250,225 250,300 C250,353 290,392 340,392 C390,392 430,353 430,300 C430,225 340,90 340,90 Z" fill="url(#shineDark)"/>
    <ellipse cx="300" cy="225" rx="14" ry="30" fill="#EAF6FF" opacity="0.4"/>
  </g>
  <g class="eyeOpen">
    <ellipse cx="306" cy="270" rx="9" ry="13" fill="#04122A"/>
    <ellipse cx="374" cy="270" rx="9" ry="13" fill="#04122A"/>
    <circle cx="309" cy="265" r="2.5" fill="#EAF6FF"/>
    <circle cx="377" cy="265" r="2.5" fill="#EAF6FF"/>
  </g>
  <g class="eyeClosed">
    <path d="M292,272 Q306,260 320,272" fill="none" stroke="#04122A" stroke-width="4" stroke-linecap="round"/>
    <path d="M360,272 Q374,260 388,272" fill="none" stroke="#04122A" stroke-width="4" stroke-linecap="round"/>
  </g>
  <circle cx="288" cy="304" r="12" fill="#7FB8E8" opacity="0.45"/>
  <circle cx="392" cy="304" r="12" fill="#7FB8E8" opacity="0.45"/>
  <path d="M308,302 Q340,332 372,302" fill="none" stroke="#04122A" stroke-width="4.5" stroke-linecap="round"/>
</g>
</svg>
